services:
  clarity-db:
    image: pgvector/pgvector:pg16
    container_name: clarity-walk-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=claritywalk
      - POSTGRES_USER=clarity
      - POSTGRES_PASSWORD=clarity
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
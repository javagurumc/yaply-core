server:
    port: 8080

spring:
    application:
        name: clarity-walk-core
    datasource:
        url: jdbc:postgresql://localhost:5432/claritywalk
        username: clarity
        password: clarity
    flyway:
        enabled: true

    jpa:
        defer-datasource-initialization: false
        hibernate:
            ddl-auto: validate
        show-sql: false
        open-in-view: false
        format_sql: true

claritywalk:
    # Frontend URL for OAuth redirects
    frontend:
        url: ${FRONTEND_URL:http://localhost:5173}
    openai:
        apiKey: ${OPENAI_API_KEY:}
        # Realtime session creation endpoint (server-to-server)
        realtimeSessionsUrl: https://api.openai.com/v1/realtime/sessions
        # Choose your model; keep configurable
        model: gpt-realtime
    jwt:
        # Secret key for signing JWT tokens (should be set via environment variable in production)
        secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-please-make-it-long-enough}
        # Token expiration time in milliseconds (24 hours = 86400000)
        expiration: 86400000
    oauth2:
        google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/oauth2/callback/google}
        facebook:
            client-id: ${FACEBOOK_CLIENT_ID:}
            client-secret: ${FACEBOOK_CLIENT_SECRET:}
            redirect-uri: ${FACEBOOK_REDIRECT_URI:http://localhost:8080/api/auth/oauth2/callback/facebook}
server:
    port: 8080

spring:
    application:
        name: clarity-walk-core
    datasource:
        url: jdbc:postgresql://localhost:5432/claritywalk
        username: clarity
        password: clarity

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: false
        properties:
            hibernate:
                format_sql: true
                open-in-view: false
    flyway:
        enabled: true
        locations: classpath:db/migration

claritywalk:
    openai:
        apiKey: ${OPENAI_API_KEY:}
        # Realtime session creation endpoint (server-to-server)
        realtimeSessionsUrl: https://api.openai.com/v1/realtime/sessions
        # Choose your model; keep configurable
        model: gpt-4o-realtime-preview
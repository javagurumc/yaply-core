server:
    port: 8080

spring:
    config:
        import: optional:file:.env[.properties]
    application:
        name: yaply-core
    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME}}
        username: ${SPRING_DATASOURCE_USERNAME:${DB_USER}}
        password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
    flyway:
        enabled: true

    jpa:
        defer-datasource-initialization: false
        hibernate:
            ddl-auto: validate
        show-sql: false
        open-in-view: false
        format_sql: true

    mail:
        host: ${EMAIL_SMTP_HOST:smtp.gmail.com}
        port: ${EMAIL_SMTP_PORT:587}
        username: ${EMAIL_SMTP_USERNAME:}
        password: ${EMAIL_SMTP_PASSWORD:}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
                        required: true
                    connectiontimeout: 5000
                    timeout: 5000
                    writetimeout: 5000

claritywalk:
    # Frontend URL for OAuth redirects
    frontend:
        url: ${FRONTEND_URL:http://localhost:5173}
    openai:
        apiKey: ${OPENAI_API_KEY:}
        # Realtime session creation endpoint (server-to-server)
        realtimeSessionsUrl: https://api.openai.com/v1/realtime/sessions
        # Choose your model; keep configurable
        model: gpt-realtime

    # Knowledge Base (RAG) Configuration
    kb:
        embedding:
            model: ${KB_EMBEDDING_MODEL:text-embedding-3-large}
            dimension: ${KB_EMBEDDING_DIMENSION:3072}
            batch-size: ${KB_EMBEDDING_BATCH_SIZE:100}
        batch-size: 100              # Max texts per batch
        chunking:
            max-chunk-size: 800          # tokens per chunk
            overlap-size: 100            # overlap tokens
        summarization:
            model: gpt-4o                 # Model for summarization
        retrieval:
            default-top-k: ${KB_DEFAULT_TOP_K:5}           # default results
            max-top-k: ${KB_MAX_TOP_K:20}                  # max allowed
            max-returned-tokens: ${KB_MAX_TOKENS:2000}     # cap total tokens

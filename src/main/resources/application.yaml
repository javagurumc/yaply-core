server:
    port: 8080

spring:
    application:
        name: clarity-walk-core
    datasource:
        url: jdbc:postgresql://localhost:5432/claritywalk
        username: clarity
        password: clarity
    flyway:
        enabled: true

    jpa:
        defer-datasource-initialization: false
        hibernate:
            ddl-auto: validate
        show-sql: false
        open-in-view: false
        format_sql: true

claritywalk:
    openai:
        apiKey: ${OPENAI_API_KEY:}
        # Realtime session creation endpoint (server-to-server)
        realtimeSessionsUrl: https://api.openai.com/v1/realtime/sessions
        # Choose your model; keep configurable
        model: gpt-realtime